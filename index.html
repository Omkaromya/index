<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Love You</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:Arial;
    color:white;
    text-align:center;
}

.container{
    animation: fadeIn 2s;
}

h1{
    font-size:60px;
}

p{
    font-size:22px;
}

.heart{
    font-size:80px;
    animation: beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{opacity:0}
    to{opacity:1}
}
</style>
</head>

<body>

<div class="container">
<div class="heart">❤️</div>
<h1>I Love You Mansi</h1>
<p>You are the most special person in my life</p>
<p>Forever & Always 💕</p>
</div>

</body>
</html>
